apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-health
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: 8090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-auth
  annotations:
    # CHAINING: First check Auth0 (Who?), then check OpenFGA (What can they do?)
    traefik.ingress.kubernetes.io/router.middlewares: |
      {{ .Release.Namespace }}-auth0-errors@kubernetescrd,
      {{ .Release.Namespace }}-auth0-proxy@kubernetescrd,
      {{ .Release.Namespace }}-openfga-auth@kubernetescrd
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: 8090
